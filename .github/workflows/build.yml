name: Build Flutter APK

on:
  workflow_dispatch:
    inputs:
      code:
        description: 'Flutter code to build'
        required: true
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Create Flutter project
        run: |
          cd ..
          rm -rf flutter_project
          flutter create flutter_project --empty
          cd flutter_project
          mkdir -p lib
          cat << 'EOF' > lib/main.dart
          ${{ github.event.inputs.code }}
          EOF

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build APK
        run: |
          cd ../flutter_project
          flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v3
        with:
          name: app-release
          path: ../flutter_project/build/app/outputs/flutter-apk/app-release.apk
